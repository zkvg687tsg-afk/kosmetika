// ── Helpers ──────────────────────────────────────────────────────────────────
function addMonths(dateStr,months){const d=new Date(dateStr);d.setMonth(d.getMonth()+parseInt(months));return d;}
function daysLeft(date){const now=new Date();now.setHours(0,0,0,0);const t=new Date(date);t.setHours(0,0,0,0);return Math.round((t-now)/86400000);}
function fmtDate(str){return str?new Date(str).toLocaleDateString("cs-CZ"):null;}
function computeExpiry(p){if(p.openedDate&&p.paoMonths>0)return addMonths(p.openedDate,p.paoMonths);if(p.expiryDate)return new Date(p.expiryDate);return null;}
function expiryColor(days){if(days===null)return null;if(days<0)return"#FF3B30";if(days<=60)return"#FF9500";return"#34C759";}
function expiryText(days,exp){if(days===null||!exp)return null;const date=fmtDate(exp);if(days<0)return"Expirováno "+date;if(days===0)return"Expiruje dnes - "+date;if(days<=60)return date+" (za "+days+" dní)";return date;}

// Worker URL — doplň po nasazení na Cloudflare:
const WORKER_URL = "https://kosmetika.jh8pww9vgw.workers.dev";

// ── localStorage ─────────────────────────────────────────────────────────────
function loadKey(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):[];}catch{return[];}}
function saveKey(key,data){try{localStorage.setItem(key,JSON.stringify(data));}catch{}}
function getToken(){return localStorage.getItem("at-token")||"";}
function setToken(t){localStorage.setItem("at-token",t);}

// ── API přes Worker ───────────────────────────────────────────────────────────
async function fetchFromAirtable(token){
  const url=WORKER_URL||"";
  if(!url) return {error:"no worker"};
  try{
    const r=await fetch(url,{headers:{"Authorization":"Bearer "+token}});
    if(!r.ok) return {error:r.status};
    return await r.json();
  }catch(e){return {error:e.message};}
}

async function pushToAirtable(token,products,archived,shopping){
  const url=WORKER_URL||"";
  if(!url) return;
  try{
    const body=JSON.stringify({products,archived,shopping,updatedAt:new Date().toISOString()});
    await fetch(url,{method:"POST",headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},body});
  }catch{}
}

// ── Image resize ──────────────────────────────────────────────────────────────
function resizeToBase64(file){return new Promise(function(resolve,reject){
  const img=new Image();const url=URL.createObjectURL(file);
  img.onload=function(){const ratio=Math.min(500/img.width,500/img.height,1);const w=Math.round(img.width*ratio);const hh=Math.round(img.height*ratio);const c=document.createElement("canvas");c.width=w;c.height=hh;c.getContext("2d").drawImage(img,0,0,w,hh);URL.revokeObjectURL(url);resolve(c.toDataURL("image/jpeg",0.8));};
  img.onerror=function(){URL.revokeObjectURL(url);reject(new Error("err"));};img.src=url;
});}

// ── Batch decoders ────────────────────────────────────────────────────────────
const EL_YEAR={A:[2005,2015,2025],B:[2006,2016,2026],C:[2007,2017],D:[2008,2018],E:[2009,2019],F:[2010,2020],G:[2011,2021],H:[2012,2022],J:[2013,2023],K:[2014,2024],L:[2015,2025],M:[2016,2026],N:[2017],P:[2018],Q:[2019],R:[2020],S:[2021],T:[2022],U:[2023],V:[2024],W:[2025],X:[2026]};
function resolveELYear(letter,month,day){if(month<1||month>12||day<1||day>31)return null;const cands=EL_YEAR[letter];if(!cands)return null;const now=new Date();let best=null;for(const y of cands){if(new Date(y,month-1,day)<=now)best=y;}if(!best)return null;return new Date(best,month-1,day).toISOString().slice(0,10);}
function decodeEL(code){const u=code.toUpperCase().replace(/\s/g,"");const m3=u.match(/^([A-HJ-NP-Z])(\d)(\d)$/);if(m3)return resolveELYear(m3[1],parseInt(m3[2]),parseInt(m3[3]));const m5=u.match(/^([A-HJ-NP-Z])(\d{2})(\d{2})$/);if(m5)return resolveELYear(m5[1],parseInt(m5[2]),parseInt(m5[3]));const mF=u.match(/^[A-Z]{2,3}(\d{2})(\d{2})$/);if(mF){const yr=2000+parseInt(mF[1]);const wk=parseInt(mF[2]);if(wk>=1&&wk<=53){const d=new Date(yr,0,1);d.setDate(d.getDate()+(wk-1)*7);return d.toISOString().slice(0,10);}}return null;}
const DM1={A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,J:9,K:10,L:11,M:12};
const DM2={N:1,P:2,Q:3,R:4,S:5,T:6,U:7,V:8,W:9,X:10,Y:11,Z:12};
function decodeDior(code){const u=code.toUpperCase().replace(/\s/g,"");const m=u.match(/^(\d)([A-HJ-NP-Z])(\d{2})$/);if(!m)return null;const yd=parseInt(m[1]);const ml=m[2];let month=null,set=null;if(DM1[ml]!==undefined){month=DM1[ml];set=1;}else if(DM2[ml]!==undefined){month=DM2[ml];set=2;}if(!month)return null;const now=new Date();const cands=set===1?[1998+yd,2018+yd]:[2008+yd];let best=null;for(const y of cands){if(new Date(y,month-1,1)<=now)best=y;}if(!best)return null;return new Date(best,month-1,1).toISOString().slice(0,10);}
function decodeLRP(code){const u=code.toUpperCase().replace(/\s/g,"");const m=u.match(/^(\d{2})([A-Z])(\d{2})/);if(!m)return null;const doy=parseInt(m[1]);const yr2=parseInt(m[3]);if(doy<1||doy>366)return null;const now=new Date();const curY2=now.getFullYear()%100;const fy=yr2<=curY2?2000+yr2:1900+yr2;const d=new Date(fy,0,1);d.setDate(d.getDate()+doy-1);if(isNaN(d.getTime())||d>now)return null;return d.toISOString().slice(0,10);}
function decodeBatch(brand,code){const c=(code||"").trim();if(!c)return null;if(brand==="mac"||brand==="el")return decodeEL(c);if(brand==="dior")return decodeDior(c);if(brand==="lrp")return decodeLRP(c);return null;}

// ── BatchDecoder ──────────────────────────────────────────────────────────────
function BatchDecoder({form,setForm}){
  const [brand,setBrand]=useState("mac");
  const [result,setResult]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{const b=(form.brand||"").toLowerCase();if(b.includes("mac"))setBrand("mac");else if(b.includes("estée")||b.includes("estee")||b.includes("lauder"))setBrand("el");else if(b.includes("dior"))setBrand("dior");else if(b.includes("roche")||b.includes("posay"))setBrand("lrp");},[form.brand]);
  const decode=()=>{const code=(form.batchCode||"").trim();if(!code){setResult({ok:false,msg:"Zadejte batch kód."});return;}const date=decodeBatch(brand,code);if(date){set("manufacturingDate",date);const formatted=new Date(date).toLocaleDateString("cs-CZ",{year:"numeric",month:"long"});setResult({ok:true,msg:"Výroba: "+formatted});}else{setResult({ok:false,msg:"Nepodařilo se dekódovat. Zkontrolujte formát nebo zadejte ručně."});}};

    h("div",{style:{padding:"10px 16px",borderBottom:"0.5px solid rgba(0,0,0,0.08)"}},
      h("div",{style:{fontSize:"12px",color:"#8E8E93",marginBottom:"6px"}},"Značka pro dekódování:"),
      h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"8px"}},BATCH_BRANDS.map(br=>h("button",{key:br.id,onClick:()=>{setBrand(br.id);setResult(null);},style:{padding:"5px 12px",borderRadius:"20px",border:"none",fontSize:"13px",fontWeight:brand===br.id?600:400,background:brand===br.id?"#111":"rgba(116,116,128,0.12)",color:brand===br.id?"#fff":"#555"}},br.label))),
      h("button",{onClick:decode,style:{width:"100%",background:"#007AFF",color:"#fff",border:"none",borderRadius:"10px",padding:"10px",fontSize:"14px",fontWeight:600}},"Dekódovat datum výroby"),
      result&&h("div",{style:{fontSize:"13px",color:result.ok?"#34C759":"#FF9500",marginTop:"6px",fontWeight:result.ok?600:400}},(result.ok?"✓ ":"⚠ ")+result.msg),
      brand==="lrp"&&h("div",{style:{fontSize:"12px",color:"#8E8E93",marginTop:"6px",lineHeight:1.5}},"La Roche-Posay má více formátů — výsledek je orientační.")),
    h("div",{style:{display:"flex",alignItems:"center",padding:"11px 16px"}},h("div",{style:{width:"130px",flexShrink:0,fontSize:"15px",color:"#111"}},"Datum výroby"),h("input",{type:"date",value:form.manufacturingDate||"",onChange:e=>{set("manufacturingDate",e.target.value);setResult(null);},style:{flex:1,border:"none",outline:"none",background:"transparent",fontSize:"15px",color:"#111",textAlign:"right"}})));
}

function ExportBox({products,archived}){
  const [text,setText]=useState(null);
  const [copied,setCopied]=useState(false);
  const show=()=>{setText(JSON.stringify({exported:new Date().toISOString(),products,archived},null,2));setCopied(false);};
  const copy=()=>{if(!text)return;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>setCopied(true));}else{const el=document.getElementById("exp-ta");if(el){el.select();document.execCommand("copy");setCopied(true);}}};
  return h("div",{style:{background:"#fff",borderRadius:"12px",overflow:"hidden",marginBottom:"12px"}},
    h("div",{style:{padding:"14px 16px"}},
      h("div",{style:{fontWeight:600,marginBottom:"4px"}},"Exportovat zálohu"),
      h("div",{style:{fontSize:"13px",color:"#8E8E93",marginBottom:"10px",lineHeight:1.5}},"Zobraz JSON, pak Kopírovat — ulož do Poznámek."),
      !text?h("button",{onClick:show,style:{width:"100%",background:"#111",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontSize:"15px",fontWeight:600}},"Zobrazit JSON"):
      h("div",null,
        h("textarea",{id:"exp-ta",readOnly:true,value:text,rows:6,style:{width:"100%",padding:"10px 12px",borderRadius:"10px",border:"1px solid #E0E0E0",fontSize:"11px",outline:"none",background:"#F2F2F7",fontFamily:"monospace",resize:"none",color:"#555",marginBottom:"8px"}}),
        h("button",{onClick:copy,style:{width:"100%",background:copied?"#34C759":"#007AFF",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontSize:"15px",fontWeight:600}},copied?"✓ Zkopírováno!":"Kopírovat"))));
}

// ── SyncSheet ─────────────────────────────────────────────────────────────────
function SyncSheet({products,archived,productCount,archivedCount,onPasteImport,onClose}){
  const [paste,setPaste]=useState("");
  const [status,setStatus]=useState(null);
  const [pending,setPending]=useState(null);
  const parse=()=>{const t=paste.trim();if(!t){setStatus({ok:false,msg:"Pole je prázdné."});return;}const s=t.indexOf("{");const e=t.lastIndexOf("}");if(s<0||e<0){setStatus({ok:false,msg:"Neplatný JSON."});return;}try{const data=JSON.parse(t.slice(s,e+1));if(!data.products||!Array.isArray(data.products)){setStatus({ok:false,msg:"JSON neobsahuje produkty."});return;}setPending(data);setStatus({ok:null,msg:"Nalezeno "+data.products.length+" produktů. Potvrdit?"});}catch{setStatus({ok:false,msg:"Chyba při čtení JSON."});}};

function SetupScreen({onSave}){
  const [val,setVal]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const save=async()=>{
    const t=val.trim();
    if(!t){setErr("Zadej token.");return;}
    setLoading(true);setErr("");
    const data=await fetchFromAirtable(t);
    if(data&&data.error){setErr("Token nefunguje ("+data.error+"). Zkontroluj ho a zkus znovu.");setLoading(false);return;}
    setToken(t);
    onSave(t,data);
  };
  return h("div",{style:{minHeight:"100vh",background:"#F2F2F7",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}},
    h("div",{style:{background:"#fff",borderRadius:"20px",padding:"32px 24px",width:"100%",maxWidth:"360px",textAlign:"center"}},
      h("div",{style:{fontSize:"48px",marginBottom:"12px"}},"🔑"),
      h("div",{style:{fontSize:"22px",fontWeight:700,marginBottom:"8px"}},"Propojit s Airtable"),
      h("div",{style:{fontSize:"14px",color:"#8E8E93",marginBottom:"24px",lineHeight:1.5}},"Zadej svůj Airtable Personal Access Token. Uloží se jen do tohoto zařízení."),
      h("input",{type:"password",value:val,onChange:e=>setVal(e.target.value),placeholder:"pat...",style:{width:"100%",padding:"12px",borderRadius:"10px",border:"1px solid #E0E0E0",fontSize:"15px",outline:"none",marginBottom:"8px",fontFamily:"monospace"}}),
      err&&h("div",{style:{fontSize:"13px",color:"#FF3B30",marginBottom:"12px"}},"⚠ "+err),
      h("button",{onClick:save,disabled:loading,style:{width:"100%",background:"#000",color:"#fff",border:"none",borderRadius:"12px",padding:"14px",fontSize:"16px",fontWeight:600}},loading?"Připojuji...":"Připojit"),

}

function App(){
  const [token,setTokenState]=useState(()=>getToken());
  const [products,setProducts]=useState(()=>loadKey("cos-v2-products"));
  const [archived,setArchived]=useState(()=>loadKey("cos-v2-archived"));
  const [shopping,setShopping]=useState(()=>loadKey("cos-v2-shopping"));
  const [tab,setTab]=useState("all");

  const [showForm,setShowForm]=useState(false);
  const [showSync,setShowSync]=useState(false);
  const [showDel,setShowDel]=useState(null);
  const [syncStatus,setSyncStatus]=useState(null);

  const handleSetup=(t,data)=>{
    setTokenState(t);
    if(data&&data.products){
      setProducts(data.products);
      setArchived(data.archived||[]);
      setShopping(data.shopping||[]);
      saveKey("cos-v2-products",data.products);
      saveKey("cos-v2-archived",data.archived||[]);
      saveKey("cos-v2-shopping",data.shopping||[]);
    }
    setSyncStatus("ok");
  };

  // Načtení dat z Airtable při startu
  useEffect(()=>{
    if(!token){setSyncStatus(null);return;}
    setSyncStatus("syncing");
    fetchFromAirtable(token).then(data=>{
      if(data&&data.products){
        setProducts(data.products);
        setArchived(data.archived||[]);
        setShopping(data.shopping||[]);
        saveKey("cos-v2-products",data.products);
        saveKey("cos-v2-archived",data.archived||[]);
        saveKey("cos-v2-shopping",data.shopping||[]);
        setSyncStatus("ok");
      } else {
        setSyncStatus("offline");
      }
    });
  },[token]);

  if(!token) return h(SetupScreen,{onSave:handleSetup});

  const saveProds=list=>{
    setProducts(list);saveKey("cos-v2-products",list);
    pushToAirtable(token,list,archived,shopping);
  };
  const saveArch=list=>{
    setArchived(list);saveKey("cos-v2-archived",list);
    pushToAirtable(token,products,list,shopping);
  };
  const saveShop=list=>{
    setShopping(list);saveKey("cos-v2-shopping",list);
    pushToAirtable(token,products,archived,list);
  };
  const openAdd=()=>{setForm({...EMPTY});setEditId(null);setShowForm(true);};
  const openEdit=p=>{setForm({...EMPTY,...p});setEditId(p.id);setShowForm(true);};
  const handleSave=()=>{if(!form.name.trim())return;if(editId){if(showArchiveEdit){saveArch(archived.map(p=>p.id===editId?{...p,...form,id:editId}:p));setShowArchiveEdit(false);}else{saveProds(products.map(p=>p.id===editId?{...form,id:editId}:p));}}else{const id=Math.random().toString(36).slice(2)+Date.now().toString(36);saveProds([...products,{...form,id}]);}setShowForm(false);};
  const duplicateProd=p=>{const id=Math.random().toString(36).slice(2)+Date.now().toString(36);const dup={...p,id,name:p.name+" (kopie)",openedDate:"",manufacturingDate:""};saveProds([...products,dup]);};
  const [showBuyPrompt,setShowBuyPrompt]=useState(null);
  const addToShopping=(p)=>{const id=Math.random().toString(36).slice(2)+Date.now().toString(36);const item={id,name:p.name,brand:p.brand,photoUrl:p.photoUrl,photoData:p.photoData,addedDate:new Date().toISOString(),bought:false};saveShop([...shopping,item]);};
  const toggleBought=(id)=>saveShop(shopping.map(s=>s.id===id?{...s,bought:!s.bought}:s));
  const deleteShop=(id)=>saveShop(shopping.filter(s=>s.id!==id));
  const clearBought=()=>saveShop(shopping.filter(s=>!s.bought));
  const editArchived=p=>{const updated={...EMPTY,...p};setForm(updated);setEditId(p.id);setShowForm(true);setShowArchiveEdit(true);};
  const [showArchiveEdit,setShowArchiveEdit]=useState(false);
  const archiveProd=(p,reason)=>{saveProds(products.filter(x=>x.id!==p.id));saveArch([...archived,{...p,archivedReason:reason,archivedDate:new Date().toISOString()}]);setShowBuyPrompt(p);};
  const deleteProd=id=>{saveProds(products.filter(p=>p.id!==id));};
  const deleteArch=id=>{saveArch(archived.filter(p=>p.id!==id));};
  const pasteImport=data=>{saveProds(data.products);saveArch(data.archived||[]);if(data.shopping)saveShop(data.shopping);};

        h("div",{style:{display:"flex",gap:"6px"}},
          h("button",{onClick:()=>setShowSync(true),style:hdrBtn},"Záloha"),

        h("div",{style:{fontSize:"22px",marginBottom:"8px"}},"🛒"),
        h("div",{style:{fontWeight:600,fontSize:"17px",marginBottom:"6px"}},"Přidat na nákupní seznam?"),
        h("div",{style:{fontSize:"14px",color:"#8E8E93",marginBottom:"20px"}},showBuyPrompt.name),
        h("div",{style:{display:"flex",gap:"8px"}},
          h("button",{onClick:()=>setShowBuyPrompt(null),style:{flex:1,background:"#F2F2F7",border:"none",borderRadius:"10px",padding:"12px",fontSize:"15px",fontWeight:600}},"Ne"),
          h("button",{onClick:()=>{addToShopping(showBuyPrompt);setShowBuyPrompt(null);setTab("shopping");},style:{flex:1,background:"#000",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontSize:"15px",fontWeight:600}},"Přidat")))),
    showSync&&h(SyncSheet,{products,archived,productCount:products.length,archivedCount:archived.length,onPasteImport:pasteImport,onClose:()=>setShowSync(false)}),
    showForm&&h(FormSheet,{form,setForm,onSave:handleSave,onClose:()=>setShowForm(false),isEdit:!!editId}),
    showDel&&h("div",{style:{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px"}},
      h("div",{style:{position:"absolute",inset:0,background:"rgba(0,0,0,0.4)"},onClick:()=>setShowDel(null)}),
      h("div",{style:{position:"relative",background:"#fff",borderRadius:"16px",padding:"24px",width:"100%",maxWidth:"320px",textAlign:"center"}},
        h("div",{style:{fontWeight:600,fontSize:"17px",marginBottom:"8px"}},"Smazat produkt?"),
        h("div",{style:{fontSize:"14px",color:"#8E8E93",marginBottom:"20px"}},"Tato akce je nevratná."),
        h("div",{style:{display:"flex",gap:"8px"}},
          h("button",{onClick:()=>setShowDel(null),style:{flex:1,background:"#F2F2F7",border:"none",borderRadius:"10px",padding:"12px",fontSize:"15px",fontWeight:600}},"Zrušit"),
          h("button",{onClick:()=>{showDel.isArchived?deleteArch(showDel.id):deleteProd(showDel.id);setShowDel(null);},style:{flex:1,background:"#FF3B30",color:"#fff",border:"none",borderRadius:"10px",padding:"12px",fontSize:"15px",fontWeight:600}},"Smazat")))));
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
